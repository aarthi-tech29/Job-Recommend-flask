<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Login</title>

    <style>

        * {

            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;

        }

        body {

            height: 100vh;

            display: flex;
            justify-content: center;
            align-items: center;

            background: linear-gradient(
                135deg,
                #0f172a,
                #1e3a8a
            );

        }

        .login-container {

            width: 400px;

            background: white;

            padding: 40px;

            border-radius: 20px;

            box-shadow:
                0 10px 30px rgba(0,0,0,0.2);

            text-align: center;

        }

        .login-container h1 {

            color: #0f172a;

            margin-bottom: 10px;

            font-size: 32px;

        }

        .login-container p {

            color: gray;

            margin-bottom: 30px;

        }

        .input-group {

            margin-bottom: 20px;

        }

        .input-group input {

            width: 100%;

            padding: 14px;

            border: 1px solid #d1d5db;

            border-radius: 10px;

            font-size: 16px;

            outline: none;

            transition: 0.3s;

        }

        .input-group input:focus {

            border-color: #2563eb;

            box-shadow:
                0 0 5px rgba(37,99,235,0.5);

        }

        .login-btn {

            width: 100%;

            padding: 14px;

            border: none;

            border-radius: 10px;

            background: #2563eb;

            color: white;

            font-size: 16px;

            cursor: pointer;

            transition: 0.3s;

        }

        .login-btn:hover {

            background: #1d4ed8;

        }

        .demo-box {

            margin-top: 30px;

            background: #f1f5f9;

            padding: 15px;

            border-radius: 12px;

            text-align: left;

        }

        .demo-box h3 {

            margin-bottom: 10px;

            color: #0f172a;

        }

        .demo-box p {

            margin-bottom: 8px;

            color: #334155;

            font-size: 14px;

        }

        .icon {

            font-size: 50px;

            margin-bottom: 15px;

        }

    </style>

</head>

<body>

    <div class="login-container">

        <div class="icon">
            💼
        </div>

        <h1>
            Job Portal Login
        </h1>

        <p>
            AI Powered Job Recommendation System
        </p>

        <form method="POST">

            <div class="input-group">

                <input
                    type="text"
                    name="username"
                    placeholder="Enter Username"
                    required
                >

            </div>

            <div class="input-group">

                <input
                    type="password"
                    name="password"
                    placeholder="Enter Password"
                    required
                >

            </div>

            <button
                type="submit"
                class="login-btn"
            >
                Login
            </button>

        </form>

        <div class="demo-box">

            <h3>
                Demo Accounts
            </h3>

            <p>
                🔓 Free User:
                freeuser / 123
            </p>

            <p>
                👑 Premium User:
                premiumuser / 123
            </p>

        </div>

    </div>

</body>

</html>
