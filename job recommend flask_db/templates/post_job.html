<!DOCTYPE html>
<html>

<head>

    <title>Post Job</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

    <div class="container">

        <h1>Post a Job</h1>
        <a href="/" class="top-btn">
        Back to Home
        </a>
        

        <!-- =========================
             FORM
        ========================== -->

        <form method="POST" class="job-form">

            <label>Company Name</label>

            <input type="text"
                   name="company"
                   placeholder="Example: Infosys"
                   required>

            <label>Role</label>

            <input type="text"
                   name="role"
                   placeholder="Example: Python Developer"
                   required>

            <label>Skills (comma separated)</label>

            <input type="text"
                   name="skills"
                   placeholder="python, flask, django"
                   required>

            <button type="submit">

                Post Job

            </button>

        </form>
        <!-- =========================
             SUCCESS MESSAGE
        ========================== -->

        {% if message %}

            <div class="success-message">

                {{ message }}

            </div>

        {% endif %}

        <!-- =========================
             LATEST JOB
        ========================== -->

        {% if latest_job %}

            <h2>Latest Posted Job</h2>

            <div class="card">

                <h3>{{ latest_job.company }}</h3>

                <p>
                    <b>Role:</b>

                    {{ latest_job.role }}
                </p>

                <p>
                    <b>Skills:</b>

                    {{ ", ".join(latest_job.skills) }}
                </p>

            </div>

        {% endif %}

    </div>

</body>

</html>
